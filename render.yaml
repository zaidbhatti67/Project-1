services:
  - type: web
    name: nexus-workspace-backend
    runtime: node
    plan: free
    region: oregon
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
